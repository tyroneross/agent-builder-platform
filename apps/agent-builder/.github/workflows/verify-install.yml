name: Verify @tyroneross/agent-builder install

# Smoke-tests the consumer install path against GitHub Packages.
# Chains after publish-npm.yml; also manually triggerable for any version.
# Uses GITHUB_TOKEN (auto-granted packages:read), so no PAT required.

on:
  workflow_run:
    workflows: ["Publish @tyroneross/agent-builder to GitHub Packages"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to verify (omit to use plugin/package.json)"
        required: false
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version to verify
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V=$(node -p "require('./plugin/package.json').version")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Verifying @tyroneross/agent-builder@$V"

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tyroneross"
          always-auth: true
          package-manager-cache: false

      - name: Wait for GitHub Packages propagation
        if: github.event_name == 'workflow_run'
        run: sleep 45

      - name: Sandbox install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/verify && cd /tmp/verify
          npm init -y >/dev/null
          npm install "@tyroneross/agent-builder@${{ steps.ver.outputs.version }}"

          INSTALLED=$(jq -r .version node_modules/@tyroneross/agent-builder/package.json)
          if [ "$INSTALLED" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Installed version ($INSTALLED) does not match requested (${{ steps.ver.outputs.version }})"
            exit 1
          fi

          # Plugin companion content should ship: SKILL.md, both manifests,
          # examples, references, and the companion README + metadata. Keep
          # the high-leverage catalog/template paths explicit so release checks
          # catch packaging regressions in the portable skill surface.
          required_paths=(
            SKILL.md
            README.md
            metadata.json
            .claude-plugin/plugin.json
            .codex-plugin/plugin.json
            examples
            references
            references/catalog/07-local-operational-patterns.md
            references/catalog/08-repo-skill-architecture.md
            references/catalog/09-skill-bank-and-chaining.md
            references/catalog/10-cross-host-deployment.md
            references/templates/agentic-handoff/skill-contract.md
            references/build/01-build-skill-or-plugin.md
            references/build/02-dual-format-parity.md
            references/build/03-polyglot-script-guide.md
            references/build/04-research-first-protocol.md
            references/templates/build/README.md
            references/templates/build/SKILL.md.template
            references/templates/build/AGENTS.md.template
            references/templates/build/plugin.json.template
            references/templates/build/parity-checklist.md
            references/scripts/scaffold_skill.py
          )
          for required in "${required_paths[@]}"; do
            if [ ! -e "node_modules/@tyroneross/agent-builder/$required" ]; then
              echo "::error::Missing from installed package: $required"
              exit 1
            fi
          done

          FILE_COUNT=$(find node_modules/@tyroneross/agent-builder -type f | wc -l | tr -d ' ')
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "::error::Suspiciously small install — only $FILE_COUNT files"
            exit 1
          fi

          echo "::notice::Verified @tyroneross/agent-builder@$INSTALLED — $FILE_COUNT files installed"
